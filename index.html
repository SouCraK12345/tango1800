<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap');

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 20px;
            overflow: hidden;
            font-family: "Noto Sans JP", sans-serif;
        }

        .main-container {
            border-radius: 20px;
            background-color: #f5f7fb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h3 {
            text-align: center;
        }

        span {
            white-space: nowrap;
        }

        .fallback-button {
            margin-top: 12px;
            padding: 8px 12px;
            border: 1px solid #ccd4e0;
            border-radius: 6px;
            background-color: #fff;
            cursor: pointer;
            font-family: inherit;
        }

        .handover-output {
            display: none;
            width: min(100%, 640px);
            margin-top: 12px;
        }

        .handover-output textarea {
            width: 100%;
            min-height: 120px;
            box-sizing: border-box;
            font-family: monospace;
        }

        .handover-output p {
            margin: 8px 0 0;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <h3><span>このページは</span><a
                href="https://tango1800.soucrak.f5.si/">https://tango1800.soucrak.f5.si/</a><span>に移行しました</span></h3>
        <p>現行のデータを引き継ぐには、<a href="#" onclick="callback()">こちら</a>をクリックしてください。</p>
        <button class="fallback-button" type="button" onclick="showManualHandoverData()">うまくいかないときは</button>
        <div class="handover-output" id="handoverOutput">
            <textarea id="handoverText" readonly></textarea>
            <p>上のテキストをコピーして、
                <a href="https://tango1800.soucrak.f5.si/settings?migration">このページ</a>に貼り付けてください
            </p>
        </div>
        <a href="https://soucrak.f5.si/">「なんざんホーム」へ</a>
    </div>
    <script>
        const HANDOVER_STORAGE_KEYS = [
            "correct_counts_v1",
            "wrong_counts_v1",
            "correct_counts_v1_dict_0",
            "correct_counts_v1_dict_1",
            "wrong_counts_v1_dict_0",
            "wrong_counts_v1_dict_1",
            "counts_dict_migration_v1_done_correct_counts_v1",
            "counts_dict_migration_v1_done_wrong_counts_v1",
            "customStart",
            "customEnd"
        ];

        function collectHandoverStorage() {
            return HANDOVER_STORAGE_KEYS.reduce((storage, key) => {
                const value = localStorage.getItem(key);
                if (value !== null) storage[key] = value;
                return storage;
            }, {});
        }

        function callback(url = "https://tango1800.soucrak.f5.si/settings") {
            location.href = url + "?previous_data=" + JSON.stringify(collectHandoverStorage());
        }

        function showManualHandoverData() {
            const handoverText = document.getElementById("handoverText");
            handoverText.value = JSON.stringify(collectHandoverStorage());
            document.getElementById("handoverOutput").style.display = "block";
            handoverText.focus();
            handoverText.select();
        }

        const params = new URLSearchParams(location.search);
        if (params.has("export")) {
            callback(params.get("callbackurl"));
        }
    </script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9BV2543QVK"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-9BV2543QVK');
    </script>
</body>

</html>
