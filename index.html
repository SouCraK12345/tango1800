<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            border-radius: 20px;
            background-color: #f5f7fb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <h1>現在、サーバーメンテナンス中です。</h1>
        <p>ご迷惑をおかけして申し訳ありません。</p>
        <a href="https://soucrak.f5.si/">「なんざんホーム」へ</a>
    </div>
    <script>
        const HANDOVER_ALLOWED_ORIGINS = [
            "https://soucrak.f5.si",
            "http://localhost:3000",
            "http://localhost:3001",
            "http://127.0.0.1:3000",
            "http://127.0.0.1:3001"
        ];
        const HANDOVER_STORAGE_KEYS = [
            "correct_counts_v1",
            "wrong_counts_v1",
            "correct_counts_v1_dict_0",
            "correct_counts_v1_dict_1",
            "wrong_counts_v1_dict_0",
            "wrong_counts_v1_dict_1",
            "counts_dict_migration_v1_done_correct_counts_v1",
            "counts_dict_migration_v1_done_wrong_counts_v1",
            "customStart",
            "customEnd"
        ];

        function collectHandoverStorage() {
            return HANDOVER_STORAGE_KEYS.reduce((storage, key) => {
                const value = localStorage.getItem(key);
                if (value !== null) storage[key] = value;
                return storage;
            }, {});
        }

        function sendHandoverStorage(target, targetOrigin) {
            if (!target || !HANDOVER_ALLOWED_ORIGINS.includes(targetOrigin)) return;
            target.postMessage(
                {
                    type: "STORAGE_DATA",
                    storage: collectHandoverStorage()
                },
                targetOrigin
            );
        }

        function returnHandoverStorage(returnUrl) {
            let parsedReturnUrl;
            try {
                parsedReturnUrl = new URL(returnUrl);
            } catch {
                return;
            }

            if (!HANDOVER_ALLOWED_ORIGINS.includes(parsedReturnUrl.origin)) return;

            const payload = {
                type: "STORAGE_DATA",
                storage: collectHandoverStorage()
            };
            const serializedPayload = JSON.stringify(payload);

            window.name = serializedPayload;
            parsedReturnUrl.hash = "handoverData=" + encodeURIComponent(serializedPayload);
            window.location.replace(parsedReturnUrl.toString());
        }

        window.addEventListener("message", (e) => {
            if (e.data && e.data.type === "GET_STORAGE") {
                sendHandoverStorage(e.source, e.origin);
            }
        });

        const params = new URLSearchParams(window.location.search);
        const handoverOrigin = params.get("origin");
        const handoverReturnUrl = params.get("returnUrl");
        if (params.get("handover") === "1" && handoverReturnUrl) {
            returnHandoverStorage(handoverReturnUrl);
        }

        if (params.get("handover") === "1" && handoverOrigin) {
            sendHandoverStorage(window.opener, handoverOrigin);
            window.setTimeout(() => window.close(), 500);
        }
    </script>
</body>

</html>
